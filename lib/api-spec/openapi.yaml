        - characterCount
        - castCount
        - crewCount
        - shotCount
        - budgetTotal
        - budgetAllocated
        - beatCount
        - lightingDiagramCount
        - packetCount
        - postMilestoneCount
        - postMilestoneCompleteCount
        - deliverableCount
        - distributionCount
        - distributionAcceptedCount
