components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── PROJECT ──────────────────────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        logline:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
          description: "feature | short | series | documentary"
        status:
          type: string
          nullable: true
          description: "development | pre-production | production | post-production | distribution"
        director:
          type: string
          nullable: true
        producer:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        totalBudget:
          type: number
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        title:
          type: string
        logline:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        director:
          type: string
          nullable: true
        producer:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        totalBudget:
          type: number
          nullable: true
      required:
        - title

    UpdateProjectBody:
      type: object
      properties:
        title:
          type: string
        logline:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        director:
          type: string
          nullable: true
        producer:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        totalBudget:
          type: number
          nullable: true

    ProjectDashboard:
      type: object
